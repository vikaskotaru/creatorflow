steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/creatorflow/app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/creatorflow/app:latest'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/creatorflow/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'creatorflow'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/creatorflow/app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--project=$PROJECT_ID'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/creatorflow/app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/creatorflow/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
